<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UnityMSK Ops Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>UnityMSK Ops Dashboard</h1>
      <div id="userInfo"></div>
    </header>

    <main>
      <section style="margin-bottom: 20px;">
        <label>Entity</label>
        <select id="entitySelect"></select>
      </section>

      <section style="margin-bottom: 20px;">
        <label>Week Ending</label>
        <input type="date" id="weekEnding" />
      </section>

      <section id="kpiForm"></section>

      <button id="saveBtn">Save</button>

      <div id="statusMessage" style="margin-top:16px;font-weight:bold;"></div>

      <pre id="debugOutput" style="margin-top:16px; white-space:pre-wrap; background:#0f2a3d; padding:12px;"></pre>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
